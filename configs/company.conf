<VirtualHost *:80>
    ServerName company.local
    DocumentRoot /var/www/company

    <Directory /var/www/company>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog /var/log/httpd/company-error.log
    CustomLog /var/log/httpd/company-access.log combined
</VirtualHost>
